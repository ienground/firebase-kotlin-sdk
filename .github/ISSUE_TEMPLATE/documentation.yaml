name: 📚 Documentation
description: Suggest improvements to the documentation.
title: '[DOCS] '
labels: ['documentation']
body:
  - type: dropdown
    id: target
    attributes:
      label: "📖 Target Documentation"
      options:
        - "README.md"
        - "API Documentation"
        - "Code Comments / KDoc"
        - "Tutorials / Guides"
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: "💡 Suggestion"
      placeholder: "Describe the improvements you'd like to propose."
    validations:
      required: true
