name: 🐛 Bug Report
description: Report a bug or unexpected behavior.
title: '[BUG] '
labels: ['bug']
body:
  - type: checkboxes
    id: platform
    attributes:
      label: "📱 Affected Platform"
      options:
        - label: "Android"
        - label: "iOS"
        - label: "Common (Shared)"
  - type: dropdown
    id: module
    attributes:
      label: "💻 Affected Module"
      options:
        - "firebase-common"
        - "firebase-auth"
        - "firebase-firestore"
        - "firebase-database"
        - "firebase-storage"
        - "firebase-messaging"
        - "firebase-crashlytics"
        - "firebase-config"
        - "firebase-functions"
        - "firebase-perf"
        - "firebase-inappmessaging"
        - "firebase-appcheck"
        - "firebase-appdistribution"
        - "firebase-dataconnect"
        - "firebase-installations"
        - "firebase-abt"
        - "firebase-ai"
        - "encoders"
        - "transport"
        - "example (Sample App)"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "📝 Description"
      placeholder: "Provide a clear and concise description of the bug."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: "🚀 Steps to Reproduce"
      placeholder: |
        1. 
        2. 
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "🎯 Expected Behavior"
      placeholder: "Describe what you expected to happen."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "📸 Logs / Screenshots"
      placeholder: "```kotlin\n// Paste logs or code here\n```"
